<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIGHT HIGHWAY</title>
<style>
  :root{
    --ink:#0b0e14;
    --amber:#f2a33c;
    --text:#c8cedb;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    touch-action:none;user-select:none;-webkit-user-select:none}
  #wrap{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* HUD */
  #hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;
    color:var(--text);font-variant-numeric:tabular-nums;
    text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .hud-item.right{text-align:right}
  .hud-label{font-size:10px;letter-spacing:.25em;color:#7a839a}
  .hud-value{font-size:26px;font-weight:200;letter-spacing:.05em;line-height:1.15}
  .hud-value .unit{font-size:11px;color:#7a839a;margin-left:2px;letter-spacing:.1em}

  /* オーバーレイ */
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:rgba(11,14,20,.72);backdrop-filter:blur(3px);
    color:var(--text);text-align:center;transition:opacity .35s}
  #overlay.hidden{opacity:0;pointer-events:none}
  #ttl{font-size:13px;letter-spacing:.55em;color:#8a93a8;margin-left:.55em}
  #big{font-size:42px;font-weight:100;letter-spacing:.18em;margin-left:.18em;
    text-shadow:0 0 30px rgba(242,163,60,.25)}
  #big em{font-style:normal;color:var(--amber)}
  #sub{font-size:12px;color:#7a839a;letter-spacing:.12em;line-height:2}
  #score-line{font-size:14px;letter-spacing:.2em;color:var(--text)}
  #score-line b{color:var(--amber);font-weight:400}
  #tap{margin-top:18px;font-size:12px;letter-spacing:.3em;color:var(--amber);
    border:1px solid rgba(242,163,60,.45);padding:12px 34px;border-radius:2px;
    animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){#tap{animation:none}}

  /* 操作ヒント */
  #hint{position:absolute;bottom:max(18px,env(safe-area-inset-bottom));left:0;right:0;
    display:flex;justify-content:space-between;padding:0 26px;pointer-events:none;
    color:#6b7488;font-size:10px;letter-spacing:.3em;transition:opacity 1s;
    text-shadow:0 1px 4px rgba(0,0,0,.8)}
  #hint.hidden{opacity:0}

  /* 耐久ゲージ */
  #hp{position:absolute;bottom:max(30px,env(safe-area-inset-bottom));left:50%;
    transform:translateX(-50%);width:128px;text-align:center;pointer-events:none;
    transition:opacity .4s}
  #hp.hidden{opacity:0}
  #hp .hp-label{font-size:9px;letter-spacing:.32em;color:#525c72;margin-bottom:6px;
    transition:color .3s}
  #hp.drain .hp-label{color:var(--amber)}
  #hpbar{height:2px;background:rgba(200,206,219,.14);border-radius:1px;overflow:hidden}
  #hpfill{display:block;height:100%;width:100%;background:#8a93a8;
    transform-origin:left;transition:transform .15s linear, background .3s}
  #hpfill.low{background:var(--amber)}

  /* 速度上限アップの通知 */
  #lvl{position:absolute;top:max(68px,calc(env(safe-area-inset-top) + 56px));
    left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:.35em;color:var(--amber);
    opacity:0;pointer-events:none;text-shadow:0 0 12px rgba(242,163,60,.5)}
  #lvl.show{animation:lvlpop 2.2s ease-out}
  @keyframes lvlpop{
    0%{opacity:0;transform:translate(-50%,8px)}
    15%{opacity:1;transform:translate(-50%,0)}
    70%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-4px)}
  }

  /* サウンド切替 */
  #snd{position:absolute;top:max(14px,env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);
    background:none;border:none;color:#7a839a;font-size:10px;letter-spacing:.3em;
    padding:6px 12px;cursor:pointer;z-index:5;
    font-family:inherit}
  #snd.off{color:#454e63;text-decoration:line-through}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">SPEED</div>
      <div class="hud-value"><span id="spd">0</span><span class="unit">km/h</span></div>
    </div>
    <div class="hud-item right">
      <div class="hud-label">DISTANCE</div>
      <div class="hud-value"><span id="dist">0.0</span><span class="unit">km</span></div>
    </div>
  </div>

  <button id="snd">SOUND ON</button>

  <div id="lvl">MAX SPEED +20</div>

  <div id="hp" class="hidden">
    <div class="hp-label">INTEGRITY</div>
    <div id="hpbar"><i id="hpfill"></i></div>
  </div>

  <div id="hint" class="hidden">
    <span>◀ 左をタッチ</span><span>右をタッチ ▶</span>
  </div>

  <div id="overlay">
    <div id="ttl">— 夜 行 —</div>
    <div id="big">NIGHT <em>HIGHWAY</em></div>
    <div id="sub">画面の左右を押さえてステアリング<br>前を走る車をかわし、距離を伸ばす</div>
    <div id="score-line" style="display:none"></div>
    <div id="tap">タップしてスタート</div>
  </div>
</div>

<script>
(() => {
"use strict";
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;

/* ====================================================
   オーディオ:BGM(シンセウェイブ)+ 効果音
==================================================== */
const AC = window.AudioContext || window.webkitAudioContext;
let actx=null, master=null, musicBus=null, sfxBus=null;
let soundOn = true;
let engine = null;          // エンジン音ノード群
let offroadNoise = null;    // 路肩ノイズ
let rainG = null;           // 雨音ゲイン
let tunnelSend = null;      // トンネル反響センド
let seqTimer = null, step=0, nextNoteTime=0;

const BPM = 84;
const STEP_DUR = 60/BPM/2;           // 8分音符
const m2f = m => 440 * Math.pow(2,(m-69)/12);

/* Am – F – C – G(各1小節)*/
const CHORDS = [
  { root:45, tones:[57,60,64] },   // A
  { root:41, tones:[53,57,60] },   // F
  { root:48, tones:[60,64,67] },   // C
  { root:43, tones:[55,59,62] },   // G
];
const ARP_PAT = [0,1,2,1, 0,2,1,2]; // コードトーンのインデックス

function makeNoiseBuffer(sec){
  const len = Math.floor(actx.sampleRate*sec);
  const buf = actx.createBuffer(1,len,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  return buf;
}

function initAudio(){
  if(actx) return;
  actx = new AC();
  // iOSのアンロック:最初のジェスチャー内で無音を一度鳴らす
  try{
    const ub = actx.createBuffer(1, 1, 22050);
    const us = actx.createBufferSource();
    us.buffer = ub; us.connect(actx.destination); us.start(0);
  }catch(e){}
  master = actx.createGain();
  master.gain.value = soundOn ? 1 : 0;
  master.connect(actx.destination);

  musicBus = actx.createGain(); musicBus.gain.value = 0.9;
  sfxBus   = actx.createGain(); sfxBus.gain.value = 1.0;
  musicBus.connect(master); sfxBus.connect(master);

  buildEngineSound();
  buildOffroadNoise();
  buildEventAudio();
  startSequencer();
}

/* ---- 区間イベントの音響(雨・トンネル反響) ---- */
function buildEventAudio(){
  // 雨:整形したノイズの持続音
  const rsrc = actx.createBufferSource();
  rsrc.buffer = makeNoiseBuffer(2.0); rsrc.loop = true;
  const rhp = actx.createBiquadFilter(); rhp.type='highpass'; rhp.frequency.value=900;
  const rlp = actx.createBiquadFilter(); rlp.type='lowpass';  rlp.frequency.value=8000;
  rainG = actx.createGain(); rainG.gain.value = 0;
  rsrc.connect(rhp); rhp.connect(rlp); rlp.connect(rainG); rainG.connect(sfxBus);
  rsrc.start();
  // トンネル:ディレイによる反響(BGMとSFXの両方に薄くかかる)
  tunnelSend = actx.createGain(); tunnelSend.gain.value = 0;
  const dly = actx.createDelay(1); dly.delayTime.value = 0.22;
  const fb  = actx.createGain(); fb.gain.value = 0.42;
  const dlp = actx.createBiquadFilter(); dlp.type='lowpass'; dlp.frequency.value=1500;
  musicBus.connect(tunnelSend); sfxBus.connect(tunnelSend);
  tunnelSend.connect(dly); dly.connect(dlp); dlp.connect(fb); fb.connect(dly);
  dlp.connect(master);
}
function updateEventAudio(tk, rk, sk){
  if(!actx || !rainG) return;
  const t = actx.currentTime;
  tunnelSend.gain.setTargetAtTime(tk*0.5, t, 0.3);
  rainG.gain.setTargetAtTime(rk*0.045 + sk*0.085, t, 0.4);
}
/* ---- 雷鳴 ---- */
function playThunder(){
  if(!actx) return;
  const t = actx.currentTime;
  // 轟き(低いノイズがゆっくり立ち上がり長く尾を引く)
  const n = actx.createBufferSource(); n.buffer = makeNoiseBuffer(2.6);
  const lp = actx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(420, t);
  lp.frequency.exponentialRampToValueAtTime(110, t+2.2);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.26, t+0.09);
  g.gain.exponentialRampToValueAtTime(0.001, t+2.4);
  n.connect(lp); lp.connect(g); g.connect(sfxBus);
  n.start(t); n.stop(t+2.5);
  // 地鳴り
  const o = actx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(52, t);
  o.frequency.exponentialRampToValueAtTime(27, t+1.8);
  const og = actx.createGain();
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.15, t+0.12);
  og.gain.exponentialRampToValueAtTime(0.001, t+2.0);
  o.connect(og); og.connect(sfxBus);
  o.start(t); o.stop(t+2.1);
}

/* ---- エンジン音:速度に追従する持続音 ---- */
function buildEngineSound(){
  const osc1 = actx.createOscillator(); osc1.type='sawtooth'; osc1.frequency.value=40;
  const osc2 = actx.createOscillator(); osc2.type='square';   osc2.frequency.value=40; osc2.detune.value=8;
  const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=240; lp.Q.value=1.5;
  const g  = actx.createGain(); g.gain.value=0;

  const nsrc = actx.createBufferSource();
  nsrc.buffer = makeNoiseBuffer(1.5); nsrc.loop = true;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=0.6;
  const ng = actx.createGain(); ng.gain.value=0;

  osc1.connect(lp); osc2.connect(lp); lp.connect(g); g.connect(sfxBus);
  nsrc.connect(bp); bp.connect(ng); ng.connect(sfxBus);
  osc1.start(); osc2.start(); nsrc.start();
  engine = { osc1, osc2, lp, g, ng };
}
function updateEngine(spdRatio, on){
  if(!engine) return;
  const t = actx.currentTime;
  const f = 38 + spdRatio*82;                 // 周波数は絶対速度に比例(上限なし)
  const gr = Math.min(spdRatio, 1.25);        // 音量・フィルターは頭打ち
  engine.osc1.frequency.setTargetAtTime(f, t, 0.08);
  engine.osc2.frequency.setTargetAtTime(f*1.5, t, 0.08);
  engine.lp.frequency.setTargetAtTime(220 + gr*700, t, 0.1);
  engine.g.gain.setTargetAtTime(on ? 0.024 + gr*0.030 : 0, t, 0.15);
  engine.ng.gain.setTargetAtTime(on ? gr*0.011 : 0, t, 0.15);
}

/* ---- 路肩走行ノイズ ---- */
function buildOffroadNoise(){
  const src = actx.createBufferSource();
  src.buffer = makeNoiseBuffer(1.2); src.loop = true;
  const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=320;
  const g = actx.createGain(); g.gain.value=0;
  src.connect(lp); lp.connect(g); g.connect(sfxBus);
  src.start();
  offroadNoise = { g };
}
function setOffroad(on){
  if(!offroadNoise) return;
  offroadNoise.g.gain.setTargetAtTime(on?0.12:0, actx.currentTime, 0.06);
}

/* ---- 衝突音 ---- */
function playCrash(){
  if(!actx) return;
  const t = actx.currentTime;
  // 衝撃ノイズ
  const n = actx.createBufferSource(); n.buffer = makeNoiseBuffer(0.8);
  const lp = actx.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(3200,t);
  lp.frequency.exponentialRampToValueAtTime(120, t+0.7);
  const ng = actx.createGain();
  ng.gain.setValueAtTime(0.5,t);
  ng.gain.exponentialRampToValueAtTime(0.001, t+0.8);
  n.connect(lp); lp.connect(ng); ng.connect(sfxBus);
  n.start(t); n.stop(t+0.85);
  // 低い「ドン」
  const o = actx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(130,t);
  o.frequency.exponentialRampToValueAtTime(36, t+0.5);
  const og = actx.createGain();
  og.gain.setValueAtTime(0.45,t);
  og.gain.exponentialRampToValueAtTime(0.001, t+0.6);
  o.connect(og); og.connect(sfxBus);
  o.start(t); o.stop(t+0.65);
  // BGMを一瞬沈める
  musicBus.gain.cancelScheduledValues(t);
  musicBus.gain.setValueAtTime(musicBus.gain.value, t);
  musicBus.gain.linearRampToValueAtTime(0.25, t+0.15);
  musicBus.gain.linearRampToValueAtTime(0.9, t+2.4);
}

/* ---- 損耗による停止音(静かに息絶える) ---- */
function playBreakdown(){
  if(!actx) return;
  const t = actx.currentTime;
  // スパッタ(息継ぎするようなノイズ)
  for(let i=0;i<4;i++){
    const n = actx.createBufferSource(); n.buffer = makeNoiseBuffer(0.12);
    const bp = actx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value = 520 - i*95;
    const g = actx.createGain();
    const st = t + i*0.17;
    g.gain.setValueAtTime(0.20, st);
    g.gain.exponentialRampToValueAtTime(0.001, st+0.13);
    n.connect(bp); bp.connect(g); g.connect(sfxBus);
    n.start(st); n.stop(st+0.14);
  }
  // 下降していくトーン
  const o = actx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(30, t+1.2);
  const og = actx.createGain();
  og.gain.setValueAtTime(0.16, t);
  og.gain.exponentialRampToValueAtTime(0.001, t+1.3);
  o.connect(og); og.connect(sfxBus);
  o.start(t); o.stop(t+1.35);
  // BGMを一瞬沈める
  musicBus.gain.cancelScheduledValues(t);
  musicBus.gain.setValueAtTime(musicBus.gain.value, t);
  musicBus.gain.linearRampToValueAtTime(0.25, t+0.2);
  musicBus.gain.linearRampToValueAtTime(0.9, t+2.6);
}

/* ---- スタート音 ---- */
function playStart(){
  if(!actx) return;
  const t = actx.currentTime;
  [880, 1174.7].forEach((f,i)=>{
    const o = actx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t+i*0.14);
    g.gain.exponentialRampToValueAtTime(0.12, t+i*0.14+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+i*0.14+0.3);
    o.connect(g); g.connect(sfxBus);
    o.start(t+i*0.14); o.stop(t+i*0.14+0.35);
  });
}

/* ---- BGMシーケンサ ---- */
function startSequencer(){
  step = 0;
  nextNoteTime = actx.currentTime + 0.1;
  let wasRunning = (actx.state === 'running');
  seqTimer = setInterval(()=>{
    // 起動完了までは予約せず待機し、走り出した瞬間に時刻を合わせ直す
    if(actx.state !== 'running'){ wasRunning = false; return; }
    if(!wasRunning){
      wasRunning = true;
      nextNoteTime = actx.currentTime + 0.1;
    }
    while(nextNoteTime < actx.currentTime + 0.15){
      scheduleStep(step, nextNoteTime);
      step++;
      nextNoteTime += STEP_DUR;
    }
  }, 30);
}
function scheduleStep(s, t){
  const bar = Math.floor(s/8);
  const chord = CHORDS[bar % CHORDS.length];
  const inBar = s % 8;

  // パッド:小節頭
  if(inBar===0) playPad(chord, t, STEP_DUR*8);
  // ベース:8分で根音(2,6拍目はオクターブ上)
  playBass(chord.root + ((inBar===2||inBar===6)?12:0), t);
  // アルペジオ:控えめなプラック
  playPluck(chord.tones[ARP_PAT[inBar]] + 12, t, inBar);
  // ハット:裏拍(30km以降は表にも小さなゴーストが入り、密度がわずかに上がる)
  if(inBar%2===1) playHat(t, 0.014);
  else if(stage >= 3) playHat(t, 0.007);
}
function playPad(chord, t, dur){
  // 熱を帯びるほどフィルターが開き、こもった音が艶を帯びる
  const cutoff = 620 + heatVis*1500;
  chord.tones.forEach(m=>{
    [-6,6].forEach(det=>{
      const o = actx.createOscillator(); o.type='sawtooth';
      o.frequency.value = m2f(m); o.detune.value = det;
      const lp = actx.createBiquadFilter(); lp.type='lowpass';
      lp.frequency.value = cutoff; lp.Q.value = 0.4;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.022, t+dur*0.3);
      g.gain.setValueAtTime(0.022, t+dur*0.75);
      g.gain.linearRampToValueAtTime(0.0001, t+dur);
      o.connect(lp); lp.connect(g); g.connect(musicBus);
      o.start(t); o.stop(t+dur+0.05);
    });
  });
}
function playBass(m, t){
  const o = actx.createOscillator(); o.type='triangle';
  o.frequency.value = m2f(m);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.085, t+0.015);
  g.gain.exponentialRampToValueAtTime(0.001, t+STEP_DUR*0.92);
  o.connect(g); g.connect(musicBus);
  o.start(t); o.stop(t+STEP_DUR);
}
function playPluck(m, t, inBar){
  const o = actx.createOscillator(); o.type='sine';
  o.frequency.value = m2f(m);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.035, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0008, t+0.34);
  const p = actx.createStereoPanner ? actx.createStereoPanner() : null;
  if(p){ p.pan.value = (inBar%2===0)? -0.35 : 0.35; o.connect(g); g.connect(p); p.connect(musicBus); }
  else { o.connect(g); g.connect(musicBus); }
  o.start(t); o.stop(t+0.4);
}
function playHat(t, vol){
  const n = actx.createBufferSource(); n.buffer = makeNoiseBuffer(0.06);
  const hp = actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol || 0.014, t);
  g.gain.exponentialRampToValueAtTime(0.0005, t+0.05);
  n.connect(hp); hp.connect(g); g.connect(musicBus);
  n.start(t); n.stop(t+0.06);
}

/* サウンド切替 */
const sndBtn = document.getElementById('snd');
sndBtn.addEventListener('click', e=>{
  e.stopPropagation();
  soundOn = !soundOn;
  sndBtn.textContent = soundOn ? 'SOUND ON' : 'SOUND OFF';
  sndBtn.classList.toggle('off', !soundOn);
  if(master) master.gain.setTargetAtTime(soundOn?1:0, actx.currentTime, 0.1);
});
sndBtn.addEventListener('touchstart', e=>e.stopPropagation(), {passive:true});

/* ====================================================
   描画リサイズと背景素材
==================================================== */
let stars=[], skyline=[], ridge=[];
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBackdrop();
}
function buildBackdrop(){
  // 星
  stars = [];
  const n = Math.floor(W*H/9000);
  for(let i=0;i<n;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H*0.48,
      r: Math.random()*1.1+0.3,
      tw: Math.random()*Math.PI*2,
      sp: 0.5+Math.random()*1.5
    });
  }
  // 街のシルエット(ループ幅 = 2W)
  skyline = [];
  let x = 0;
  while(x < W*2){
    const bw = 26 + Math.random()*60;

function addRoad(n, curve, ease){
  for(let i=0;i<n;i++){
    let c = curve||0;
    if(ease==='in')  c = curve * (i/n);
    if(ease==='out') c = curve * (1 - i/n);
    segments.push({ curve:c });
  }
}
function buildTrack(){
  segments = [];
  addRoad(60, 0);
  addRoad(40, 2.2,'in'); addRoad(50, 2.2); addRoad(40, 2.2,'out');
  addRoad(50, 0);
  addRoad(35,-3.0,'in'); addRoad(60,-3.0); addRoad(35,-3.0,'out');
  addRoad(40, 0);
  addRoad(30, 4.0,'in'); addRoad(40, 4.0); addRoad(30, 4.0,'out');
  addRoad(30,-1.6);
  addRoad(60, 0);
  addRoad(45, 3.2,'in'); addRoad(45,-3.2);
  addRoad(70, 0);
  trackLen = segments.length * SEG_LEN;
}
function seg(z){ return segments[Math.floor(z/SEG_LEN) % segments.length]; }

const CAR_PALETTE = ['#3d4a6b','#54426b','#2f4a58','#4a3d5e','#39435c'];
/* 車種:幅は共通、長さ(見かけの高さ)と意匠が異なる */
const CAR_KINDS = [
  { id:'sedan', f:0.78 },
  { id:'hatch', f:0.62 },
  { id:'van',   f:1.02 },
  { id:'truck', f:1.18 },
];
function pickKind(){
  const r = Math.random();
  if(r < 0.35) return CAR_KINDS[0];
  if(r < 0.60) return CAR_KINDS[1];
  if(r < 0.80) return CAR_KINDS[2];
  return CAR_KINDS[3];
}
function spawnTraffic(count){
  traffic = [];
  for(let i=0;i<count;i++){
    const k = pickKind();
    traffic.push({
      z: ((i+1)/(count+1))*trackLen,
      x: (Math.floor(Math.random()*LANES) - 1) * 0.62,
      spd: MAX_SPEED * (0.28 + Math.random()*0.22),
      col: CAR_PALETTE[i%CAR_PALETTE.length],

    });

}

/* ---------- 流星(55km以降、12kmごとに一つ) ---------- */
function spawnMeteor(quiet){
  const dir = Math.random() < 0.5 ? 1 : -1;          // 流れる向き
  const sp = 380 + Math.random()*220;
  const ang = (0.32 + Math.random()*0.18) * Math.PI; // 浅い角度で落ちる
  meteors.push({
    x: W*(0.5 - dir*0.32) + (Math.random()-0.5)*W*0.2,
    y: H*(0.04 + Math.random()*0.12),
    vx: dir * Math.cos(ang*0.4) * sp,
    vy: Math.sin(ang*0.4) * sp * 0.55,
    t: 0, life: 1.3 + Math.random()*0.5
  });
  if(!quiet) playMeteor();
}
function updateMeteors(dt){
  for(const m of meteors){
    m.t += dt;
    m.x += m.vx*dt;
    m.y += m.vy*dt;
  }
  meteors = meteors.filter(m => m.t < m.life);
}
function renderMeteors(){
  for(const m of meteors){
    // ふっと現れ、ふっと消える
    const a = Math.min(m.t/0.18, 1) * Math.min((m.life-m.t)/0.45, 1);
    const len = 110 + Math.abs(m.vx)*0.12;
    const tx = m.x - (m.vx/(Math.hypot(m.vx,m.vy)||1))*len;
    const ty = m.y - (m.vy/(Math.hypot(m.vx,m.vy)||1))*len;
    // 尾
    const tr = ctx.createLinearGradient(m.x, m.y, tx, ty);
    tr.addColorStop(0, `rgba(235,240,255,${0.85*a})`);
    tr.addColorStop(0.35, `rgba(190,205,245,${0.35*a})`);
    tr.addColorStop(1, 'rgba(190,205,245,0)');
    ctx.strokeStyle = tr;
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    // 頭のきらめき
    ctx.fillStyle = `rgba(245,248,255,${a})`;
    ctx.shadowColor = '#dfe8ff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 1.8, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}
/* 流星の音:高いきらめきと、尾を引いて下りていくグリッサンド */
function playMeteor(){
  if(!actx) return;
  const t = actx.currentTime;
  // きらめき(下降する三つの鐘)
  [2093, 1661.2, 1318.5].forEach((f,i)=>{
    const o = actx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g = actx.createGain();
    const st = t + i*0.09;
    g.gain.setValueAtTime(0.0001, st);
    g.gain.exponentialRampToValueAtTime(0.05, st+0.015);
    g.gain.exponentialRampToValueAtTime(0.0008, st+0.7);
    o.connect(g); g.connect(sfxBus);
    o.start(st); o.stop(st+0.75);
  });
  // 尾(かすかに揺れながら下降するグリス)
  [0, 5].forEach(det=>{
    const o = actx.createOscillator(); o.type='sine';
    o.detune.value = det;
    o.frequency.setValueAtTime(1900, t);
    o.frequency.exponentialRampToValueAtTime(620, t+1.4);
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.022, t+0.12);
    g.gain.exponentialRampToValueAtTime(0.0008, t+1.5);
    o.connect(g); g.connect(sfxBus);
    o.start(t); o.stop(t+1.55);
  });
}

/* ---------- 破損エフェクト ---------- */
function spawnBreak(){
  const px = W/2, py = H*0.86;
  // 琥珀の火の粉
  for(let i=0;i<46;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 40 + Math.random()*230;
    particles.push({
      type:'ember',
      x: px + (Math.random()-0.5)*44,
      y: py - 18 + (Math.random()-0.5)*18,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 90,
      life: 0.9 + Math.random()*1.4, t:0,
      size: 1 + Math.random()*2.2
    });
  }
  // 車体の破片(淡い色のかけら)
  for(let i=0;i<14;i++){
    const a = -Math.PI/2 + (Math.random()-0.5)*1.7;
    const sp = 130 + Math.random()*270;
    particles.push({
      type:'shard',
      x: px + (Math.random()-0.5)*52, y: py - 24,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*9,
      life: 1.4 + Math.random()*0.9, t:0,
      size: 3 + Math.random()*7
    });
  }
}
function updateParticles(dt){
  if(dead) deathT += dt;
  for(const p of particles){
    p.t += dt;
    p.vy += (p.type==='shard' ? 640 : 190) * dt;   // 重力(火の粉は軽い)
    p.vx *= (1 - 0.8*dt);
    p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.type==='shard') p.rot += p.vr*dt;
  }
  particles = particles.filter(p => p.t < p.life);
}
function renderParticles(){
  for(const p of particles){
    const k = 1 - p.t/p.life;
    if(p.type==='ember'){
      ctx.fillStyle = `rgba(242,163,60,${0.85*k})`;
      ctx.shadowColor = '#f2a33c';
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      ctx.shadowBlur = 0;
    }else{
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = `rgba(223,229,242,${0.8*k})`;
      ctx.fillRect(-p.size/2, -p.size*0.3, p.size, p.size*0.6);
      ctx.restore();
    }
  }
}

/* 区間のフェード係数(出入口fade kmで0→1→0) */
function bandK(km, a, b, f){
  if(km <= a || km >= b) return 0;
  return Math.min((km-a)/f, (b-km)/f, 1);
}

/* ---------- 更新 ---------- */
function update(dt){
  globalT += dt;
  if(ending){
    // 真の終点:手を離れ、車は夜明けへ向かって走り続ける
    endingT += dt;
    visLean *= 0.95;
    playerX += (0 - playerX) * Math.min(1, dt*1.2);
    const cruise = MAX_SPEED * 0.5;
    speed += (cruise - speed) * Math.min(1, dt*0.6);
    pos = (pos + speed*dt) % trackLen;
    distKm += (speed*dt) / 18000;
    shake *= 0.9;
    updateEngine(speed / MAX_SPEED, true);
    document.getElementById('spd').textContent = Math.round(speed/32);
    document.getElementById('dist').textContent = distKm.toFixed(1);
    if(endingT > 8 && !endingShown){
      endingShown = true;
      showEnding();
    }
    return;
  }
  if(!playing){
    shake *= 0.92;
    visLean *= 0.9;
    return;
  }

  const s = seg(pos + SEG_LEN*2);
  speed = Math.min(speed + ACCEL*dt, curMax);

  const spdRatio = speed / curMax;
  visLean += (steer - visLean) * Math.min(1, dt*7);
  playerX += steer * STEER * dt * spdRatio;
  playerX -= s.curve * CENTRIFUGAL * dt * spdRatio * spdRatio;

  const off = Math.abs(playerX) > 0.92;
  if(off){
    speed *= OFFROAD_DEC;
    shake = Math.min(shake+dt*12, 4);
    hp -= dt/10;                       // 合計10秒で破損
    hpEl.classList.add('drain');
    // 路面との擦過で散る小さな火花
    if(Math.random() < 0.6){
      const side = playerX > 0 ? 1 : -1;
      particles.push({
        type:'ember',
        x: W/2 + side*42 + (Math.random()-0.5)*14,
        y: H*0.86 + (Math.random()-0.5)*10,
        vx: -side*(30+Math.random()*90), vy: -(50+Math.random()*130),
        life: 0.3 + Math.random()*0.4, t:0,
        size: 1 + Math.random()*1.6
      });
    }
  }else{
    shake *= 0.85;
    hpEl.classList.remove('drain');
  }
  if(off !== isOffroad){ isOffroad = off; setOffroad(off); }
  playerX = Math.max(-1.35, Math.min(1.35, playerX));

  hpFill.style.transform = `scaleX(${Math.max(0,hp)})`;
  hpFill.classList.toggle('low', hp < 0.4);
  if(hp <= 0){
    gameOver('wear');
    return;
  }

  pos = (pos + speed*dt) % trackLen;
  distKm += (speed*dt) / 18000;
  bgShift -= s.curve * spdRatio * dt * 60;

  // 10kmごとに上限速度+20km/h、車体は徐々に熱を帯びる
  const ns = Math.floor(distKm / 10);
  if(ns > stage){ stage = ns; stageUp(); }
  heatVis += (Math.min(stage*0.18, 1) - heatVis) * Math.min(1, dt*1.2);

  // 55km以降、12kmごとに流星がひとつ流れる(イベント区間中は流れない)
  if(distKm >= nextMeteorKm){
    nextMeteorKm += 12;
    if(evTunnel + evRain + evStorm < 0.01) spawnMeteor();
  }
  // 145km:流星群
  if(distKm >= 145 && distKm < 148.5){
    showerTimer -= dt;
    if(showerTimer <= 0){
      spawnMeteor(Math.random() < 0.6);   // 音は約4割の流星だけ
      showerTimer = 0.35 + Math.random()*0.55;
    }
  }
  // 100km到達から、空に夜明けの兆しが差しはじめる(15kmかけて)
  dawnK = Math.min(Math.max((distKm - 100) / 15, 0), 1);

  // 区間イベント(出入口は緩やかにフェード)
  evTunnel = Math.max(bandK(distKm,30,38,0.4), bandK(distKm,90,98,0.4));
  evRain   = bandK(distKm,60,75,0.8);
  evStorm  = bandK(distKm,120,135,0.8);
  tunnelScroll = (tunnelScroll + speed*dt*0.00018) % 1;
  updateEventAudio(evTunnel, evRain, evStorm);
  // 雷雨:不定期な稲光と、少し遅れて届く雷鳴
  if(evStorm > 0.4){
    flashTimer -= dt;
    if(flashTimer <= 0){
      flashTimer = 3.5 + Math.random()*6;
      flashA = 1;
      setTimeout(playThunder, 300 + Math.random()*900);
    }
  }

  // 150km:真の終点へ
  if(distKm >= 150){
    startEnding();
    return;
  }

  updateEngine(speed / MAX_SPEED, true);   // 絶対速度基準:ステージが進むほど唸りが高くなる

  for(const c of traffic){
    c.z = (c.z + c.spd*dt) % trackLen;
    let dz = c.z - pos;
    if(dz < -trackLen/2) dz += trackLen;
    if(dz > trackLen/2)  dz -= trackLen;
    if(dz > 0 && dz < SEG_LEN*0.7){
      if(Math.abs(c.x - playerX) < c.w + 0.07){
        gameOver('hit');
        return;
      }
    }
  }

  document.getElementById('spd').textContent = Math.round(speed/32);
  document.getElementById('dist').textContent = distKm.toFixed(1);
}

/* ====================================================
   描画
==================================================== */
function project(worldX, worldZ, camX){
  const dz = Math.max(worldZ, 1);
  const scale = CAM_H / dz;
  return {
    x: W/2 + scale * (worldX - camX) * (W/2) / ROAD_W * 1.9,
    y: H*0.55 + scale * CAM_H * (H/2) / ROAD_W * 0.62,
    w: scale * ROAD_W * (W/2) / ROAD_W * 1.9,
    scale
  };
}

function wrapMod(v, m){ return ((v % m) + m) % m; }

function drawBackdrop(){
  const horizon = H*0.55;

  // 空(100km以降、地平から藍とほのかな茜が差しはじめる)
  const sky = ctx.createLinearGradient(0,0,0,horizon);
  sky.addColorStop(0,    mixHex('#04060b', '#0a1126', dawnK));
  sky.addColorStop(0.55, mixHex('#0c1019', '#17223e', dawnK));
  sky.addColorStop(0.88, mixHex('#181f30', '#3a4364', dawnK));
  sky.addColorStop(1,    mixHex('#232c42', '#6e4d52', dawnK));
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,horizon);

  // 星(瞬き/夜明けとともに薄れていく)
  const starDim = 1 - dawnK*0.85;
  for(const st of stars){
    const a = (0.25 + 0.55 * (0.5 + 0.5*Math.sin(globalT*st.sp + st.tw))) * starDim;
    ctx.fillStyle = `rgba(200,210,235,${a})`;
    ctx.fillRect(st.x, st.y, st.r, st.r);
  }

  // 月(夜明けとともに淡くなる)
  const mx = W*0.76, my = H*0.14, mr = Math.min(W,H)*0.045;
  ctx.globalAlpha = 1 - dawnK*0.5;
  const halo = ctx.createRadialGradient(mx,my,mr*0.4, mx,my,mr*4);
  halo.addColorStop(0,'rgba(220,228,245,0.10)');
  halo.addColorStop(1,'rgba(220,228,245,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(mx-mr*4,my-mr*4,mr*8,mr*8);
  ctx.fillStyle = '#dfe5f2';
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = mixHex('#0c1019', '#17223e', dawnK);
  ctx.beginPath(); ctx.arc(mx-mr*0.42,my-mr*0.18,mr*0.92,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // 流星
  renderMeteors();

  // 真の終点:朝日が地平から昇る
  if(ending){
    const sunK = Math.min(endingT/7, 1);
    const sx2 = W*0.5, sy2 = horizon + 16 - sunK*30;
    const sg = ctx.createRadialGradient(sx2, sy2, 4, sx2, sy2, H*0.32);
    sg.addColorStop(0, `rgba(255,205,130,${0.45*sunK})`);
    sg.addColorStop(0.4, `rgba(242,163,60,${0.18*sunK})`);
    sg.addColorStop(1, 'rgba(242,163,60,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, horizon);
    ctx.fillStyle = `rgba(255,224,170,${0.95*sunK})`;
    ctx.shadowColor = '#ffd9a0';
    ctx.shadowBlur = 30*sunK;
    ctx.beginPath();
    ctx.arc(sx2, sy2, 14 + sunK*14, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 遠い山並み(パララックス小)
  const rShift = wrapMod(bgShift*0.12, W*2);
  ctx.fillStyle = '#0e1320';
  ctx.beginPath();
  ctx.moveTo(-10, horizon);
  for(let rep=-1;rep<=1;rep++){
    for(const r of ridge){
      const px = r.x - rShift + rep*W*2;
      if(px < -120 || px > W+120) continue;
      ctx.lineTo(px, horizon - r.h);
    }
  }
  ctx.lineTo(W+10, horizon);
  ctx.closePath(); ctx.fill();

  // 街のシルエット(パララックス中)
  const sShift = wrapMod(bgShift*0.3, W*2);
  for(let rep=-1;rep<=1;rep++){
    for(const b of skyline){
      const px = b.x - sShift + rep*W*2;
      if(px+b.w < -10 || px > W+10) continue;
      ctx.fillStyle = '#0a0d15';
      ctx.fillRect(px, horizon-b.h, b.w, b.h);
      // 窓灯り(琥珀)
      ctx.fillStyle = 'rgba(242,163,60,0.55)';
      for(const wn of b.win){
        ctx.fillRect(px+wn.dx, horizon-b.h+wn.dy, 2.4, 2.8);
      }
    }
  }

  // 地平の靄(街の照り返し/夜明けとともにわずかに濃く、温かく)
  const glowA = 0.085 + dawnK*0.09;
  const glow = ctx.createLinearGradient(0,horizon-H*0.07,0,horizon+H*0.02);
  glow.addColorStop(0,'rgba(242,163,60,0)');
  glow.addColorStop(0.8,`rgba(242,163,60,${glowA})`);
  glow.addColorStop(1,`rgba(242,163,60,${glowA*0.25})`);
  ctx.fillStyle = glow;
  ctx.fillRect(0,horizon-H*0.07,W,H*0.09);

  // 地面
  const gnd = ctx.createLinearGradient(0,horizon,0,H);
  gnd.addColorStop(0,'#11151f');
  gnd.addColorStop(1,'#0a0d14');
  ctx.fillStyle = gnd;
  ctx.fillRect(0,horizon,W,H-horizon);

  // トンネル区間:空が覆われ、琥珀の天井灯が頭上を流れていく
  if(evTunnel > 0.01){
    ctx.fillStyle = `rgba(8,10,15,${0.93*evTunnel})`;
    ctx.fillRect(0, 0, W, horizon);
    ctx.fillStyle = `rgba(10,12,17,${0.45*evTunnel})`;
    ctx.fillRect(0, horizon, W, H-horizon);
    const N = 7;
    for(let i=0;i<N;i++){
      const tt = ((i/N + tunnelScroll) % 1);
      const s = tt*tt;
      const y = horizon * (1 - 0.94*s);
      const lw = 10 + s*W*0.5;
      const a = evTunnel * (0.10 + 0.5*s);
      ctx.fillStyle = `rgba(242,163,60,${a})`;
      ctx.fillRect(W/2 - lw/2, y, lw, 2 + s*5);
    }
  }
}

function render(){
  drawBackdrop();

  const sx = (Math.random()-0.5)*shake*2;
  const sy = (Math.random()-0.5)*shake;

  const baseSeg = Math.floor(pos/SEG_LEN);
  let x=0, dx=0;
  const camX = playerX * ROAD_W;
  let maxY = H;
  const polys = [];
  const poles = [];

  for(let n=0;n<DRAW_SEGS;n++){
    const i = (baseSeg + n) % segments.length;
    const sgm = segments[i];
    const zNear = n*SEG_LEN - (pos % SEG_LEN);
    const zFar  = zNear + SEG_LEN;
    if(zFar < 1) { x += dx; dx += sgm.curve; continue; }

    const p1 = project(x, zNear + 1, camX);
    const p2 = project(x + dx, zFar + 1, camX);
    x += dx; dx += sgm.curve;

    if(p1.y <= maxY){
      const dark = Math.floor((baseSeg+n)/RUMBLE)%2===0;
      const fog = Math.min(n/DRAW_SEGS*1.15, 1);
      polys.push({p1,p2,dark,fog});
      // 街灯(左右交互、7セグメントごと/トンネル内では消える)
      if(i % 7 === 0){
        const side = (Math.floor(i/7)%2===0)? -1 : 1;
        poles.push({ x: p1.x + side*p1.w*1.18, y: p1.y, s: p1.scale,
                     fog: Math.min(1, fog + evTunnel), side });
      }
      maxY = p1.y;
    }
  }

  /* 路面(奥から手前) */
  for(let k=polys.length-1;k>=0;k--){
    const {p1,p2,dark,fog} = polys[k];
    // アスファルト(ヘッドライトの照りを中央に)
    ctx.fillStyle = dark ? '#12161f' : '#151a27';
    quad(p1.x-p1.w+sx, p1.y+sy, p1.x+p1.w+sx, p2.x-p2.w+sx, p2.y+sy, p2.x+p2.w+sx);
    // 路肩ライン
    const ew = 0.04;
    ctx.fillStyle = `rgba(205,212,228,${0.55*(1-fog)})`;
    quad(p1.x-p1.w+sx, p1.y+sy, p1.x-p1.w*(1-ew)+sx, p2.x-p2.w+sx, p2.y+sy, p2.x-p2.w*(1-ew)+sx);
    quad(p1.x+p1.w*(1-ew)+sx, p1.y+sy, p1.x+p1.w+sx, p2.x+p2.w*(1-ew)+sx, p2.y+sy, p2.x+p2.w+sx);
    // 車線(破線)
    if(dark){
      ctx.fillStyle = `rgba(120,132,160,${0.5*(1-fog)})`;
      for(const lane of [-1/3, 1/3]){
        const lw = 0.012;
        quad(
          p1.x + p1.w*lane*2 - p1.w*lw + sx, p1.y + sy,
          p1.x + p1.w*lane*2 + p1.w*lw + sx,
          p2.x + p2.w*lane*2 - p2.w*lw + sx, p2.y + sy,
          p2.x + p2.w*lane*2 + p2.w*lw + sx
        );
      }
    }
  }

  /* 自車ヘッドライト:路面に落ちる光だまり(車の向きと連動して先を掃く) */
  const hlY = H*0.86;
  const hdx = visLean * W * 0.085;
  const poolCX = W/2 + sx + hdx*0.55;
  const poolCY = hlY - H*0.115;          // 自車のすぐ先の路面
  // バンパーから光だまりへ届く短い裾(ごく薄く)
  ctx.fillStyle = 'rgba(245,238,215,0.035)';
  ctx.beginPath();
  ctx.moveTo(W/2 - 30 + sx, hlY - 8);
  ctx.lineTo(poolCX - W*0.135, poolCY);
  ctx.lineTo(poolCX + W*0.135, poolCY);
  ctx.lineTo(W/2 + 30 + sx, hlY - 8);
  ctx.closePath(); ctx.fill();
  // 路面に寝かせた楕円の光だまり
  ctx.save();
  ctx.translate(poolCX, poolCY);
  ctx.scale(1, 0.30);                    // 縦に潰して路面に伏せる
  const hl = ctx.createRadialGradient(0, 0, 8, 0, 0, H*0.21);
  hl.addColorStop(0,'rgba(245,238,215,0.13)');
  hl.addColorStop(0.55,'rgba(245,238,215,0.05)');
  hl.addColorStop(1,'rgba(245,238,215,0)');
  ctx.fillStyle = hl;
  ctx.fillRect(-H*0.22, -H*0.22, H*0.44, H*0.44);
  ctx.restore();

  /* 街灯(奥から) */
  for(let k=poles.length-1;k>=0;k--){
    const p = poles[k];
    drawPole(p.x+sx, p.y+sy, p.s, p.fog, p.side);
  }

  /* 交通車両 */
  const drawList = [];
  for(const c of traffic){
    let dz = c.z - pos;
    if(dz < -trackLen/2) dz += trackLen;
    if(dz > trackLen/2)  dz -= trackLen;
    if(dz < 2 || dz > DRAW_SEGS*SEG_LEN) continue;
    let cx=0, cdx=0;
    const steps = Math.floor(dz/SEG_LEN);
    for(let n=0;n<steps;n++){
      cx += cdx; cdx += segments[(baseSeg+n)%segments.length].curve;
    }
    const p = project(cx + c.x*ROAD_W, dz, camX);
    drawList.push({p, c, dz});
  }
  drawList.sort((a,b)=>b.dz-a.dz);
  for(const {p,c,dz} of drawList){
    const cw = p.w * c.w;
    const ch = cw * c.hFac;
    const fog = Math.min(dz/(DRAW_SEGS*SEG_LEN)*1.2, 0.85);
    drawCar(p.x+sx, p.y+sy, cw, ch, c.col, fog, c.kind);
  }

  /* 自車 */
  if(playing || dead || ending){
    drawPlayer(W/2 + sx, hlY + sy);
  }

  /* 破損エフェクトと路肩火花 */
  renderParticles();

  /* 雨・雷雨 */
  if(evRain > 0.01 || evStorm > 0.01){
    const k = Math.min(1, evRain + evStorm);
    const cnt = Math.floor((55 + evStorm*95) * k);
    ctx.strokeStyle = `rgba(185,198,226,${0.22*k})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0;i<cnt;i++){
      const rx = Math.random()*W, ry = Math.random()*H;
      const rl = 12 + Math.random()*14;
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx-3, ry+rl);
    }
    ctx.stroke();
  }
  if(flashA > 0.01){
    ctx.fillStyle = `rgba(225,232,255,${flashA*0.5})`;
    ctx.fillRect(0, 0, W, H);
    flashA *= 0.86;
  }

  /* ビネット(トンネル内は包まれるように深く) */
  const vg = ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.45, W/2,H*0.5,Math.max(W,H)*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,`rgba(0,0,0,${0.42 + evTunnel*0.24})`);
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);
}

function quad(x1,y1,x2, x3,y3,x4){
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y1);
  ctx.lineTo(x4,y3); ctx.lineTo(x3,y3);
  ctx.closePath(); ctx.fill();
}

/* 街灯:細い支柱と琥珀の灯、路面への光だまり */
function drawPole(x, y, scale, fog, side){
  const h = scale * 300;
  if(h < 3) return;
  const alpha = (1-fog);
  // 光だまり
  const pool = ctx.createRadialGradient(x - side*h*0.18, y, 1, x - side*h*0.18, y, h*0.55);
  pool.addColorStop(0,`rgba(242,163,60,${0.10*alpha})`);
  pool.addColorStop(1,'rgba(242,163,60,0)');
  ctx.fillStyle = pool;
  ctx.beginPath();
  ctx.ellipse(x - side*h*0.18, y, h*0.55, h*0.16, 0, 0, Math.PI*2);
  ctx.fill();
  // 支柱
  ctx.strokeStyle = `rgba(40,48,66,${alpha})`;
  ctx.lineWidth = Math.max(1, h*0.022);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y-h);
  ctx.lineTo(x - side*h*0.18, y-h);
  ctx.stroke();
  // 灯
  ctx.fillStyle = `rgba(242,163,60,${0.9*alpha})`;
  ctx.shadowColor = '#f2a33c';
  ctx.shadowBlur = h*0.12;
  ctx.beginPath();
  ctx.arc(x - side*h*0.18, y-h, Math.max(1.2, h*0.03), 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

/* 前方車:車種ごとの後ろ姿(幅は共通、長さと意匠が異なる) */
function drawCar(x, y, w, h, col, fog, kind){
  ctx.save();
  ctx.globalAlpha = 1 - fog;
  // テールランプの路面反射
  const refl = ctx.createLinearGradient(0, y, 0, y + h*1.6);
  refl.addColorStop(0,'rgba(242,163,60,0.20)');
  refl.addColorStop(1,'rgba(242,163,60,0)');
  ctx.fillStyle = refl;
  ctx.fillRect(x-w*0.85, y, w*0.4, h*1.6);
  ctx.fillRect(x+w*0.45, y, w*0.4, h*1.6);
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(x, y, w*1.1, h*0.2, 0, 0, Math.PI*2);
  ctx.fill();
  // ボディ(縦グラデーション)
  const body = ctx.createLinearGradient(0, y-h, 0, y);
  body.addColorStop(0, lighten(col, 18));
  body.addColorStop(1, col);
  ctx.fillStyle = body;
  roundRect(x-w, y-h, w*2, h, w*0.18);

  ctx.shadowColor = '#f2a33c';
  if(kind === 'hatch'){
    // ハッチバック:背が低く、大きなリアガラス
    ctx.fillStyle = 'rgba(8,11,18,0.7)';
    roundRect(x-w*0.72, y-h*0.97, w*1.44, h*0.55, w*0.14);
    ctx.fillStyle = '#f2a33c';
    ctx.shadowBlur = w*0.6;
    roundRect(x-w*0.84, y-h*0.34, w*0.30, h*0.16, 2);
    roundRect(x+w*0.54, y-h*0.34, w*0.30, h*0.16, 2);
  }else if(kind === 'van'){
    // ワゴン:平らで高い背面、細い窓、縦型テールランプ
    ctx.fillStyle = 'rgba(8,11,18,0.6)';
    roundRect(x-w*0.66, y-h*0.94, w*1.32, h*0.22, w*0.08);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x-w*0.9, y-h*0.62, w*1.8, h*0.02);
    ctx.fillStyle = '#f2a33c';
    ctx.shadowBlur = w*0.6;
    roundRect(x-w*0.88, y-h*0.62, w*0.16, h*0.46, 2);
    roundRect(x+w*0.72, y-h*0.62, w*0.16, h*0.46, 2);
  }else if(kind === 'truck'){
    // トラック:荷箱(明るめのパネル+枠線)、低い位置の灯、上端の琥珀マーカー
    ctx.fillStyle = lighten(col, 34);
    roundRect(x-w*0.94, y-h*0.96, w*1.88, h*0.74, w*0.06);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-w*0.82, y-h*0.88, w*1.64, h*0.58);
    ctx.fillStyle = '#f2a33c';
    ctx.shadowBlur = w*0.5;
    roundRect(x-w*0.86, y-h*0.16, w*0.24, h*0.09, 2);
    roundRect(x+w*0.62, y-h*0.16, w*0.24, h*0.09, 2);
    for(const mxr of [-0.5, 0, 0.5]){
      ctx.beginPath();
      ctx.arc(x + w*mxr, y-h*0.99, Math.max(1, w*0.045), 0, Math.PI*2);
      ctx.fill();
    }
  }else{
    // セダン:従来の意匠
    ctx.fillStyle = 'rgba(8,11,18,0.7)';
    roundRect(x-w*0.62, y-h*0.96, w*1.24, h*0.42, w*0.16);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x-w*0.95, y-h*0.18, w*1.9, h*0.06);
    ctx.fillStyle = '#f2a33c';
    ctx.shadowBlur = w*0.6;
    roundRect(x-w*0.82, y-h*0.42, w*0.34, h*0.14, 2);
    roundRect(x+w*0.48, y-h*0.42, w*0.34, h*0.14, 2);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}
function lighten(hex, amt){
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255,(n>>16)+amt), g = Math.min(255,((n>>8)&255)+amt), b = Math.min(255,(n&255)+amt);
  return `rgb(${r},${g},${b})`;
}
function mixHex(a, b, k){
  const na = parseInt(a.slice(1),16), nb = parseInt(b.slice(1),16);
  const r = Math.round((na>>16)     + (((nb>>16)     - (na>>16))     * k));
  const g = Math.round(((na>>8)&255) + ((((nb>>8)&255) - ((na>>8)&255)) * k));
  const bl= Math.round((na&255)      + (((nb&255)      - (na&255))      * k));
  return `rgb(${r},${g},${bl})`;
}

/* 自車 */
function drawPlayer(x, y){
  const w = Math.min(W*0.13, 64), h = w*0.62;
  const lean = visLean * w*0.17;   // 前部がステア方向へ向く台形スキュー
  // 破損後:テールランプは明滅しながら静かに消えていく
  let tl = 1;
  if(dead){
    tl = Math.max(0, 1 - deathT*1.1) * (0.35 + 0.65*Math.abs(Math.sin(deathT*30)));
  }
  ctx.save();
  ctx.translate(x, y);
  // 影(路面側なので水平のまま)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.ellipse(0, h*0.55, w*1.25, h*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  // ここから車体:ロール(回転)+ヨー(ノーズがステア方向へ振れる)
  ctx.rotate(visLean * 0.11 + (dead ? Math.min(deathT*0.06, 0.05) : 0));
  ctx.translate(visLean * w * 0.07, 0);   // 車体がわずかに向きを変える
  if(dead){
    ctx.translate(0, Math.min(deathT*5, 3.5));
    ctx.globalAlpha = Math.max(0.78, 1 - deathT*0.12);
  }
  // ボディ(走るほど熱を帯び、白から琥珀へ)
  const body = ctx.createLinearGradient(0,-h,0,h*0.4);
  body.addColorStop(0,   mixHex('#f4f6fa', '#ffc97e', heatVis));
  body.addColorStop(0.6, mixHex('#dfe3ec', '#f2a33c', heatVis));
  body.addColorStop(1,   mixHex('#b9c0d0', '#c87f2a', heatVis));
  ctx.fillStyle = body;
  if(heatVis > 0.05 && !dead){
    ctx.shadowColor = '#f2a33c';
    ctx.shadowBlur = 20 * heatVis;
  }
  ctx.beginPath();
  ctx.moveTo(-w + lean, 0);
  ctx.lineTo(-w*0.78 + lean*0.5, -h);
  ctx.lineTo( w*0.78 + lean*0.5, -h);
  ctx.lineTo( w + lean, 0);
  ctx.quadraticCurveTo(0, h*0.42, -w + lean, 0);
  ctx.fill();
  ctx.shadowBlur = 0;
  // キャビン
  ctx.fillStyle = '#10141f';
  ctx.beginPath();
  ctx.moveTo(-w*0.55 + lean*0.5, -h*0.92);
  ctx.lineTo(-w*0.40 + lean*0.3, -h*0.45);
  ctx.lineTo( w*0.40 + lean*0.3, -h*0.45);
  ctx.lineTo( w*0.55 + lean*0.5, -h*0.92);
  ctx.closePath(); ctx.fill();
  // テールランプ(琥珀の一本線、破損後は明滅して消える)
  ctx.fillStyle = `rgba(242,163,60,${tl})`;
  ctx.shadowColor = '#f2a33c';
  ctx.shadowBlur = 16*tl;
  ctx.fillRect(-w*0.7 + lean, -h*0.30, w*1.4, h*0.10);
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath(); ctx.fill();
}

/* ---------- メインループ ---------- */
function loop(t){
  const dt = Math.min((t - lastTime)/1000, 0.05);
  lastTime = t;
  update(dt);
  updateParticles(dt);
  updateMeteors(dt);
  render();
  requestAnimationFrame(loop);
}
buildTrack();
spawnTraffic(14);
requestAnimationFrame(t=>{ lastTime=t; requestAnimationFrame(loop); });
})();
</script>
</body>
